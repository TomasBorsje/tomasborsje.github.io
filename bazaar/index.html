<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bazaar Flipper</title>
    <link rel="icon" href="https://static.wikia.nocookie.net/hypixel-skyblock/images/f/f0/Coins.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <meta name="description" content="Discover the best Hypixel Skyblock bazaar flips for maximum profit.">
    <meta name="keywords" content="bazaar flip hypixel skyblock profit calculator">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="TopBar">
    <p id="title">Bazaar Flipper</p>
    <label for="ratioSlider" id="ratioLabel">Profit Per Unit Ratio: 0.25</label><input id="ratioSlider" type="range" min="0" max="1" step="0.01" value="0.25">
    <p id="ratioInfo">Slow, High Profit <---------> Fast, Low Profit</p>
</div>
<div id="ItemDisplayHolder" class="ItemDisplayHolder">
    <div id="originalItemDisplay" class="itemDisplay" >
        <div class="itemDisplayHeader">
            <div class="imageItemContainer">
                <img class="itemImageDisplay" src="images/furf/PURE_MITHRIL.png" onerror="this.src='images/furf/question.png'">
            </div>
            <p class="itemDisplayName">Pure Mithril</p>
        </div>
        <div class="itemInfoHolder">
            <div class="itemInfoRowHolder">
                <p class="itemLabel">Buy offer: &nbsp;</p>
                <p class="itemValue">2000</p>
            </div>
            <div class="itemInfoRowHolder">
                <p class="itemLabel">Sell offer: &nbsp;</p>
                <p class="itemValue">3500</p>
            </div>
            <div class="itemInfoRowHolder">
                <p class="itemLabel">Profit: &nbsp;</p>
                <p class="itemValue">1500</p>
            </div>
            <div class="itemInfoRowHolder">
                <p class="itemLabel">Sell Rate: &nbsp;</p>
                <p class="itemValue">10</p>
            </div>
        </div>
    </div>
</div>
<div id="outputDisplay"></div>
<script src="BazaarFlip.js"></script>
</body>
</html>
